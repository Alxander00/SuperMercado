{% extends 'base.html' %}
{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Panel de Administración</h2>
        <div class="dropdown">
            <button class="btn btn-dark rounded-pill px-4 dropdown-toggle shadow-sm" data-bs-toggle="dropdown">
                <i class="fas fa-file-pdf me-2 text-danger"></i>Generar Reportes
            </button>
            <ul class="dropdown-menu border-0 shadow-lg rounded-4">
                <li><a class="dropdown-item py-2" href="/admin/reporte/dia"><i class="fas fa-calendar-day me-2 text-success"></i>Reporte del Día</a></li>
                <li><a class="dropdown-item py-2" href="/admin/reporte/semana"><i class="fas fa-calendar-week me-2 text-success"></i>Reporte Semanal</a></li>
                <li><a class="dropdown-item py-2" href="/admin/reporte/mes"><i class="fas fa-calendar-alt me-2 text-success"></i>Reporte Mensual</a></li>
            </ul>
        </div>
    </div>

    <div class="row g-4 mb-5">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm rounded-4 bg-gradient-success p-3 text-white">
                <div class="d-flex align-items-center">
                    <div class="icon-shape bg-white text-success rounded-circle p-3 me-3">
                        <i class="fas fa-shopping-bag fs-3"></i>
                    </div>
                    <div>
                        <p class="small mb-0 opacity-75">Ventas Totales</p>
                        <h2 class="fw-bold mb-0" id="kpi-registros">0</h2>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm rounded-4 bg-gradient-warning p-3 text-white">
                <div class="d-flex align-items-center">
                    <div class="icon-shape bg-white text-warning rounded-circle p-3 me-3">
                        <i class="fas fa-dollar-sign fs-3"></i>
                    </div>
                    <div>
                        <p class="small mb-0 opacity-75">Ingresos Totales</p>
                        <h2 class="fw-bold mb-0" id="kpi-ingresos">$0.00</h2>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm rounded-4 bg-gradient-info p-3 text-white">
                <div class="d-flex align-items-center">
                    <div class="icon-shape bg-white text-info rounded-circle p-3 me-3">
                        <i class="fas fa-chart-line fs-3"></i>
                    </div>
                    <div>
                        <p class="small mb-0 opacity-75">Ticket Promedio</p>
                        <h2 class="fw-bold mb-0" id="kpi-promedio">$0.00</h2>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold m-0"><i class="fas fa-chart-pie text-success me-2"></i>Análisis de Categorías</h5>
                <select id="tipo-grafico" class="form-select w-auto rounded-pill border-0 bg-light">
                    <option value="barras">Gráfico de Barras</option>
                    <option value="pastel">Gráfico de Pastel</option>
                    <option value="lineas">Tendencia Lineal</option>
                </select>
            </div>
            <div id="contenedor-grafico" class="text-center p-3"></div>
        </div>
    </div>
</div>
{% endblock %}
