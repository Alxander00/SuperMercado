<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Supermercado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="card login-card shadow-lg">
            <div class="text-center mb-4">
                <i class="fas fa-store fa-3x text-primary mb-3"></i>
                <h3 class="fw-bold">Iniciar Sesión</h3>
                <p class="text-muted">Ingresa tus credenciales</p>
            </div>
            
            <form action="/login" method="POST">
                <div class="mb-3">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" class="form-control" name="correo" value="admin@super.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Contraseña</label>
                    <input type="password" class="form-control" name="password" value="admin123" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Ingresar</button>
                <div class="text-center mt-4">
    <p class="text-muted small mb-1">¿Eres nuevo aquí? <a href="/registro" class="text-success fw-bold text-decoration-none">Crea una cuenta gratis</a></p>
    <a href="/" class="text-muted small text-decoration-none"><i class="fas fa-arrow-left me-1"></i>Volver a la tienda</a>
</div>
            </form>

            <div class="text-center mt-4">
                <small class="text-muted">
                    <strong>Prueba con:</strong><br>
                    Admin: admin@super.com | admin123<br>
                    Cliente: juan@gmail.com | cliente123
                </small>
            </div>
        </div>
    </div>
</body>
</html>
