<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin - Mercado Fresco{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    
    <div class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-leaf"></i> Mercado Fresco
        </div>
        <a href="/admin"><i class="fas fa-chart-pie"></i> Dashboard</a>
        <a href="/productos"><i class="fas fa-box"></i> Productos</a>
        <a href="/ventas"><i class="fas fa-shopping-cart"></i> Ventas</a>
        
        <a href="/logout" class="text-danger mt-5" style="border-top: 1px solid rgba(255,255,255,0.1);">
            <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
        </a>
    </div>

    <div class="main-content p-0">
        
        <div class="top-navbar">
            <h4 class="mb-0 text-muted fw-bold">Panel de Administración</h4>
            <div class="d-flex align-items-center">
                <span class="fw-bold"><i class="fas fa-user-shield text-success me-2"></i> {{ session.get('nombre', 'Admin') }}</span>
            </div>
        </div>

        <div class="p-4 bg-light min-vh-100">
            {% block content %}
            {% endblock %}
        </div>
        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
