<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Compras - Mercado Fresco</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h2 class="fw-bold m-0"><i class="fas fa-history text-success me-3"></i>Historial de Compras</h2>
            <a href="/tienda" class="btn btn-outline-success rounded-pill px-4 fw-bold">Volver</a>
        </div>

        <div class="row g-4">
            {% for p in pedidos %}
            <div class="col-md-6">
                <div class="card border-0 shadow-sm rounded-4 p-4">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <span class="badge bg-light text-muted border mb-2">Pedido #{{ p[0] }}</span>
                            <h5 class="fw-bold mb-1">{{ p[1] }}</h5>
                            <h3 class="text-success fw-bold">${{ p[2] }}</h3>
                        </div>
                        <a href="/cliente/descargar_ticket/{{ p[0] }}" class="btn btn-dark rounded-pill px-4 shadow-sm">
                            <i class="fas fa-file-pdf me-2 text-danger"></i>Ticket PDF
                        </a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
