<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Mercado Fresco</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="card login-card shadow-lg">
            <div class="text-center mb-4">
                <i class="fas fa-leaf fa-3x text-success mb-3"></i>
                <h3 class="fw-bold">Crear Cuenta</h3>
                <p class="text-muted">Únete y empieza a comprar fresco</p>
            </div>
            
            <form action="/registro" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Nombre Completo</label>
                    <input type="text" class="form-control" name="nombre" placeholder="Ej. Alex" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Correo Electrónico</label>
                    <input type="email" class="form-control" name="correo" placeholder="tu@correo.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Contraseña</label>
                    <input type="password" class="form-control" name="password" placeholder="Crea una contraseña segura" required>
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold py-2">Registrarme</button>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted small">¿Ya tienes cuenta? <a href="/login" class="text-success fw-bold text-decoration-none">Inicia Sesión aquí</a></p>
                <a href="/" class="text-muted small text-decoration-none"><i class="fas fa-arrow-left me-1"></i>Volver a la tienda</a>
            </div>
        </div>
    </div>
</body>
</html>
